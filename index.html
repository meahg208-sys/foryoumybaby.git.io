<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Do you love me?</title>
  <!-- Google Fonts for the cute handwritten style -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Fredoka:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #ffc0cb, #ffb6c1, #ffa6c9);
      font-family: 'Fredoka', sans-serif;
      overflow: hidden;
    }

    .card {
      background-color: #ffffff;
      padding: 40px 30px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
      width: 90%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .title {
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      font-size: 3rem;
      color: #331111;
      font-weight: 600;
    }

    .character-img {
      width: 140px;
      height: 140px;
      object-fit: contain;
    }

    .buttons-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      width: 100%;
      min-height: 140px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      cursor: pointer;
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      border-radius: 20px;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .btn-yes {
      background-color: #2ecc71;
      color: white;
      font-size: 1.5rem;
      padding: 15px 35px;
      box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
    }

    .btn-yes:hover {
      background-color: #27ae60;
      transform: scale(1.05);
    }

    .btn-no {
      background-color: #e74c3c;
      color: white;
      font-size: 1.1rem;
      padding: 12px 25px;
      box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
    }

    .btn-no:hover {
      background-color: #c0392b;
    }

    /* Success Screen state */
    .hidden {
      display: none !important;
    }

    .celebration-gif {
      width: 180px;
      border-radius: 12px;
    }

    .card {
    animation: pop 0.5s ease;
}

@keyframes pop {
    from {
        transform: scale(0.8);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

.btn-yes,
.btn-no {
    transition: all 0.3s ease;
}

.celebration-gif {
    width: 220px;
    border-radius: 15px;
}

.success-text{
    font-size: 2.5rem;
    color:#ff4d6d;
    animation: heartbeat 1s infinite;
}

@keyframes heartbeat{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

.ma{
    text-align:center;
    padding:20px;
    background:#fff;
    font-size:14px;
}

  </style>
</head>
<body>

  <!-- Main Question Card -->
  <div class="card" id="questionCard">
    <h1 class="title">Do you love me baby?</h1>
    
    <!-- Cute character GIF -->
    <img 
      id="characterImg"
      class="character-img" 
      src="https://media.tenor.com/gU212Jy34aAAAAAi/tkthao219-bubududu.gif" 
      alt="Cute character holding heart"
    />

    <div class="buttons-container">
      <button class="btn-yes" id="yesBtn">Yes</button>
      <button class="btn-no" id="noBtn">No</button>
    </div>
  </div>

  <!-- Success Card (Shown when YES is clicked) -->
  <div class="card hidden" id="successCard">
    <h1 class="title">Yay! I knew it! ❤️</h1>
    <img 
      class="celebration-gif" 
      src="https://media.tenor.com/fg_YkG2vEikAAAAi/bubu-dudu-kiss.gif" 
      alt="Celebration kiss"
    />
  </div>

  <div class="card hidden" id="successCard">

    <h1 class="success-text">
        ❤️ I Love You Too ❤️
    </h1>

    <img
        class="celebration-gif"
        src="https://media.tenor.com/fg_YkG2vEikAAAAi/bubu-dudu-kiss.gif"
        alt=""
    >

    <p style="font-size:22px;color:#666;">
        You made my day 🥰
    </p>

    <div class="ma">
            <h1> <i class="fa-brands fa-slack"></i>powered by Somhetsothearith</h1>
        </div>


</div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const questionCard = document.getElementById('questionCard');
    const successCard = document.getElementById('successCard');

    // Messages cycle when clicking "No"
    const noMessages = [
      "No",
      "Are you sure?",
      "Really sure?",
      "Think again!",
      "Don't do this to me 🥺",
      "Last chance!"
    ];

    let messageIndex = 0;
    let yesScale = 1;
    let noScale = 1;

    noBtn.addEventListener('click', () => {

      // Cycle through messages
      messageIndex = (messageIndex + 1) % noMessages.length;
      noBtn.textContent = noMessages[messageIndex];

      // Grow the YES button
yesScale += 0.35;
yesBtn.style.transform = `scale(${yesScale})`;

// Shrink the NO button
if (noScale > 0.4) {
  noScale -= 0.12;
  noBtn.style.transform = `scale(${noScale})`;
}
    });

    yesBtn.addEventListener("click", () => {

    questionCard.classList.add("hidden");

    successCard.classList.remove("hidden");

});

  </script>
</body>
</html>
